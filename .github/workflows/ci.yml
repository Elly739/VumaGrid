name: VumaGrid Continuous Integration Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-validation:
    name: Backend Lint & Type Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Code Compilation Integrity
      run: |
        cd backend
        python -m py_compile app/main.py app/models.py app/optimizer.py simulator.py

  frontend-build:
    name: Frontend Compilation & Build Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Node Modules
      run: |
        cd frontend
        npm ci

    - name: Compile and Build Production Next.js Bundle
      run: |
        cd frontend
        npm run build
